run_name = "test80_a768_v9"
output_dir = "runs/test80_a768_v9"

train_datasets = [
  "data/train/**/*.binpack",
]
validation_datasets = [
  "data/validation/**/*.binpack",
]

device = "auto"
num_loader_threads = 12
prefetch_batches = 2
batch_size = 16384

total_train_positions = 500000000
superbatch_positions = 50000000
validation_interval_positions = 50000000
validation_positions = 20000000

checkpoint_every = 2500
log_every = 25
console_mode = "progress"

learning_rate = 0.000875
weight_decay = 0.00002
clip_grad_norm = 1.0
amp = true
optimizer = "ranger"

feature_set = "a768"
num_features = 768
max_active_features = 32
ft_size = 768
hidden_size = 128
output_buckets = 8
head_type = "dual_value_wdl"
output_perspective = "stm"

score_clip = 1200.0
score_scale = 1.0
wdl_scale = 410.0
teacher_lambda_start = 1.0
teacher_lambda_end = 0.75
wdl_ce_weight = 0.25
head_consistency_weight = 0.05
warmup_positions = 50000000

filter_min_ply = 16
filter_max_abs_score_cp = 1200.0
filter_skip_bestmove_captures = true
filter_wld_skip = true

lr_drop_fractions = [0.5, 0.8, 0.9]
lr_drop_factor = 0.1

export_ft_scale = 127.0
export_dense_scale = 96.0
export_description = "thrawn a768 dual nnue v9 dual-head 8bucket"
