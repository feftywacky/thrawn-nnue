run_name = "test80_a768_v2"
output_dir = "runs/test80_a768_v2"

train_datasets = [
  "/Users/flin/src/thrawn-nnue/data/test80-2024-01-jan-2tb7p.min-v2.v6.binpack",
  "/Users/flin/src/thrawn-nnue/data/test80-2024-02-feb-2tb7p.min-v2.v6.binpack",
  "/Users/flin/src/thrawn-nnue/data/test80-2024-03-mar-2tb7p.min-v2.v6.binpack",
  "/Users/flin/src/thrawn-nnue/data/test80-2024-04-apr-2tb7p.min-v2.v6.binpack",
  "/Users/flin/src/thrawn-nnue/data/test80-2024-05-may-2tb7p.min-v2.v6.binpack",
]
validation_datasets = [
  "/Users/flin/src/thrawn-nnue/data/test80-2024-06-jun-2tb7p.min-v2.v6.binpack",
]
# device: auto, cuda, mps, or cpu
# auto prefers cuda, then mps, then cpu
device = "mps"
num_loader_threads = 8
batch_size = 4096
steps_per_epoch = 10000
# run validation every N training steps when validation_datasets is non-empty
validation_every = 2000
# number of validation batches to average per validation pass
validation_steps = 64
max_epochs = 200            
checkpoint_every = 10000
log_every = 25
console_mode = "progress"

learning_rate = 0.0002
weight_decay = 0.00001
clip_grad_norm = 1.0
# mixed precision is currently enabled only for CUDA
amp = true

feature_set = "a768_dual"
num_features = 768
max_active_features = 32
ft_size = 256
hidden_size = 32
output_perspective = "stm"

# optional teacher-score preprocessing before WDL target transform
# tuned for the large-magnitude test80 v6 teacher scores
score_clip = 16000.0
score_scale = 1.0
wdl_scale = 8000.0
result_lambda = 0.8

export_ft_scale = 127.0
export_dense_scale = 64.0
export_description = "thrawn a768 dual nnue"
